<!-- REKAP -->
<div class="page" id="rekap">
  <div class="section">
    <h2>Rekap Kegiatan</h2>

    <button onclick="downloadExcel()">Export Excel</button>
    <button onclick="window.print()">Print PDF</button>

    <table>
      <thead>
        <tr>
          <th>No</th>
          <th>Kegiatan</th>
          <th>Tanggal</th>
          <th>Anggaran</th>
          <th>Status</th>
        </tr>
      </thead>

      <!-- DATA KOSONG -->
      <tbody id="rekapBody">

      </tbody>
    </table>
  </div>
</div>

<!-- REALISASI -->
<div class="page" id="realisasi">
  <div class="section">
    <h2>Realisasi Kegiatan</h2>

    <table>
      <thead>
        <tr>
          <th>No</th>
          <th>Kegiatan</th>
          <th>Target</th>
          <th>Realisasi</th>
          <th>Persentase</th>
        </tr>
      </thead>

      <!-- DATA KOSONG -->
      <tbody id="realisasiBody">

      </tbody>
    </table>
  </div>
</div>
